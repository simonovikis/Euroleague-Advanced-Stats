# ============================================================
# Euroleague Advanced Analytics — Application Configuration
# ============================================================
# Edit this file to change seasons, team branding, defaults,
# and cache behaviour without touching any Python code.
# ============================================================

app:
  page_title: "Euroleague Advanced Analytics"
  page_icon: "🏀"
  layout: "wide"
  default_language: "en"
  default_competition: "E"

  languages:
    "🇬🇧 English": "en"
    "🇬🇷 Ελληνικά": "el"
    "🇩🇪 Deutsch": "de"
    "🇪🇸 Español": "es"

data:
  supported_seasons: [2025, 2024, 2023, 2022, 2021, 2020, 2019, 2018, 2017, 2016, 2015, 2014, 2013, 2012, 2011]
  default_season: 2025
  cache_ttl_seconds: 3600

  leaders_defaults:
    min_games: 10
    min_fga2: 40
    min_fga3: 30
    min_fta: 30

